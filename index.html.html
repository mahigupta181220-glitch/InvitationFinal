```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Invitation</title>

<meta property="og:title" content="Special Invitation">
<meta property="og:description" content="You are invited to the launch of Indian Kaleidoscope">
<meta property="og:image" content="ramlala.jpg">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
url("ramlala.jpg");

background-size:cover;
background-position:center 15%;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;

overflow-y:auto;
padding:20px;
}

/* CARD */

.scroll{
width:90%;
max-width:700px;
background:rgba(0,0,0,0.55);
border-radius:25px;
padding:35px;
border:2px solid gold;
box-shadow:0 0 35px rgba(255,215,0,0.5);

transform:scaleY(0);
animation:scrollOpen 1.6s forwards ease;
}

@keyframes scrollOpen{
0%{transform:scaleY(0);}
100%{transform:scaleY(1);}
}

.title{
font-family:Cinzel;
font-size:42px;
color:gold;
margin-bottom:25px;
text-shadow:0 0 10px gold;
}

/* IMAGE */

.temple{
position:relative;
width:210px;
height:210px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:6px solid gold;
box-shadow:0 0 25px gold;
}

.temple::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:radial-gradient(circle,rgba(255,215,0,0.7),transparent 70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:rays 4s linear infinite;
z-index:-1;
}

@keyframes rays{
0%{transform:translate(-50%,-50%) rotate(0deg);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}

.temple img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */

#typeText{
margin-top:25px;
font-size:17px;
line-height:1.8;
}

/* DIYA */

.diya{
font-size:34px;
margin-top:20px;
animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

/* BUTTONS */

.buttons{
margin-top:25px;
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
}

.accept{
background:gold;
color:black;
}

.decline{
background:transparent;
border:1px solid white;
color:white;
}

.share{
background:#25D366;
color:white;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
color:black;
padding:30px;
border-radius:15px;
font-size:20px;
}

/* MOBILE */

@media(max-width:600px){

.title{font-size:30px;}

.temple{
width:170px;
height:170px;
}

#typeText{
font-size:15px;
}

.buttons{
flex-direction:column;
}

button{
width:100%;
}

}

</style>
</head>

<body>

<div class="scroll">

<div class="title">Special Invitation</div>

<div class="temple">
<img src="mcu.jpg">
</div>

<div id="typeText"></div>

<div class="diya">🪔</div>

<div class="buttons">
<button class="accept" onclick="acceptInvite()">Accept</button>
<button class="decline" onclick="declineInvite()">Decline</button>
<button class="share" onclick="shareWhatsApp()">Share</button>
</div>

</div>

<div class="popup" id="popup">
<div class="popup-box" id="popupText"></div>
</div>

<audio id="bellSound" src="bell.mp3"></audio>

<script>

/* PREVIEW MODE CHECK */

const params = new URLSearchParams(window.location.search);
const previewMode = params.get("preview") === "true";

/* SOUND */

const bell=document.getElementById("bellSound");

if(!previewMode){
document.addEventListener("click",()=>{
bell.play().catch(()=>{});
},{once:true});
}

/* TYPEWRITER */

const text=
`Dear Faculty and Department,

We are delighted to invite you to the inaugural launch of our magazine
"Indian Kaleidoscope".

Theme:
Unfolding the Patterns of Temple Economies in India.

Your gracious presence will make this occasion special.`;

let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("typeText").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,35);
}
}

typeWriter();

/* POPUPS */

function acceptInvite(){
document.getElementById("popup").style.display="flex";
document.getElementById("popupText").innerHTML="Thank you for accepting the invitation!";
}

function declineInvite(){
document.getElementById("popup").style.display="flex";
document.getElementById("popupText").innerHTML="We will miss your presence.";
}

/* WHATSAPP SHARE */

function shareWhatsApp(){

let message="You are invited! Visit the invitation page: "+window.location.href;

let url="https://wa.me/?text="+encodeURIComponent(message);

window.open(url,'_blank');

}

</script>

</body>
</html>
```
